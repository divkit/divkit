name: divkit-rs

on:
  push:
    branches:
      - main
    paths:
      - "json-builder/rust/**"
      - "api_generator/**"
      - "schema/**"
      - ".github/workflows/divkit-rs.yml"
  pull_request:
    paths:
      - "json-builder/rust/**"
      - "api_generator/**"
      - "schema/**"
      - ".github/workflows/divkit-rs.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  codegen:
    name: Generate Rust code from schema
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - name: Pin Python version for codegen
        run: uv python install 3.12
      - name: Run codegen
        run: bash json-builder/rust/codegen.sh
      - name: Verify codegen is up-to-date
        if: github.event_name == 'pull_request'
        run: git diff --exit-code -- json-builder/rust/src/generated/
      - name: Upload generated sources
        uses: actions/upload-artifact@v4
        with:
          name: generated-sources
          path: json-builder/rust/src/generated/
          retention-days: 7

  check-versions:
    name: Check version consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify pyproject.toml and Cargo.toml versions match
        run: |
          PYPROJECT_VER=$(python3 -c "
          import tomllib, pathlib
          data = tomllib.loads(pathlib.Path('json-builder/rust/pyproject.toml').read_text())
          print(data['project']['version'])
          ")
          CARGO_VER=$(python3 -c "
          import tomllib, pathlib
          data = tomllib.loads(pathlib.Path('json-builder/rust/Cargo.toml').read_text())
          print(data['package']['version'])
          ")
          echo "pyproject.toml version: $PYPROJECT_VER"
          echo "Cargo.toml version:     $CARGO_VER"
          if [ "$PYPROJECT_VER" != "$CARGO_VER" ]; then
            echo "::error::Version mismatch! pyproject.toml=$PYPROJECT_VER, Cargo.toml=$CARGO_VER"
            exit 1
          fi
          echo "Versions match: $PYPROJECT_VER"

  lint:
    name: Lint Rust
    needs: codegen
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: generated-sources
          path: json-builder/rust/src/generated/
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "json-builder/rust -> target"
          shared-key: lint
      - name: Check formatting
        working-directory: json-builder/rust
        run: cargo fmt --check
      - name: Run clippy
        working-directory: json-builder/rust
        run: cargo clippy -- -D warnings

  lint-python:
    name: Lint Python
    needs: codegen
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: generated-sources
          path: json-builder/rust/src/generated/
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "json-builder/rust -> target"
          shared-key: lint-python
      - name: Install dev dependencies and build
        working-directory: json-builder/rust
        run: |
          uv sync --group dev
          uv run maturin develop --release
      - name: Ruff check
        working-directory: json-builder/rust
        run: uv run ruff check python/ tests/
      - name: Ruff format
        working-directory: json-builder/rust
        run: uv run ruff format --check python/ tests/
      - name: Mypy
        working-directory: json-builder/rust
        run: uv run mypy python/ tests/

  test-rust:
    name: Test Rust
    needs: codegen
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: generated-sources
          path: json-builder/rust/src/generated/
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "json-builder/rust -> target"
          shared-key: test
      - name: Run Rust tests
        working-directory: json-builder/rust
        run: cargo test

  test-python:
    name: Test Python ${{ matrix.python-version }}
    needs: codegen
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: generated-sources
          path: json-builder/rust/src/generated/
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "json-builder/rust -> target"
          shared-key: test
      - name: Build and install (dev)
        working-directory: json-builder/rust
        run: |
          uv venv --python ${{ matrix.python-version }}
          uv pip install maturin pytest
          uv run maturin develop --release
      - name: Run Python tests
        working-directory: json-builder/rust
        run: uv run pytest tests/ -v

  version:
    name: Check if release needed
    needs: [test-rust, test-python, lint, lint-python, check-versions]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      should_publish: ${{ steps.check_tag.outputs.should_publish }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Get version from pyproject.toml
        id: get_version
        run: |
          VERSION=$(python3 -c "
          import tomllib, pathlib
          data = tomllib.loads(pathlib.Path('json-builder/rust/pyproject.toml').read_text())
          print(data['project']['version'])
          ")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VERSION"
      - name: Check if tag already exists
        id: check_tag
        run: |
          if git rev-parse "v${{ steps.get_version.outputs.version }}" >/dev/null 2>&1; then
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "Tag v${{ steps.get_version.outputs.version }} already exists — skipping publish"
          else
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            echo "Tag v${{ steps.get_version.outputs.version }} does not exist — will publish"
          fi

  build:
    name: Build (${{ matrix.target }})
    needs: [version, codegen]
    if: needs.version.outputs.should_publish == 'true'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - os: macos-13
            target: x86_64-apple-darwin
          - os: macos-14
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: generated-sources
          path: json-builder/rust/src/generated/
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist -i 3.10 3.11 3.12 3.13 3.14
          manylinux: auto
          working-directory: json-builder/rust
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.target }}
          path: json-builder/rust/dist

  sdist:
    name: Build sdist
    needs: [version, codegen]
    if: needs.version.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: generated-sources
          path: json-builder/rust/src/generated/
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
          working-directory: json-builder/rust
      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: json-builder/rust/dist

  publish:
    name: Publish to PyPI
    needs: [build, sdist, version]
    if: needs.version.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/divkit-rs
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist
      - name: List dist contents
        run: ls -lh dist/
      - name: Create git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ needs.version.outputs.version }}"
          git push origin "v${{ needs.version.outputs.version }}"
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ needs.version.outputs.version }}"
          name: "v${{ needs.version.outputs.version }}"
          generate_release_notes: true